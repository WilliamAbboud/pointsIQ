<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log in — PointsIQ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #0c2240 100%);
    min-height: 100vh;
    color: #1e293b;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(79,70,229,0.25), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(14,165,233,0.18), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }
  a { color: inherit; text-decoration: none; }
  .outer { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
  .card { background: white; border-radius: 22px; box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4); width: 100%; max-width: 440px; padding: 44px 40px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 17px; color: #0f172a; margin-bottom: 30px; justify-content: center; }
  .logo { width: 34px; height: 34px; background: #4f46e5; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; color: white; }
  .brand small { display: block; color: #4f46e5; font-weight: 500; font-size: 11px; margin-top: -2px; letter-spacing: .04em; }
  h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; color: #0f172a; text-align: center; }
  .sub { color: #64748b; font-size: 14px; margin-bottom: 28px; text-align: center; }
  .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 14px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: 600; font-size: 14px; color: #334155; cursor: pointer; font-family: inherit; transition: all .15s; }
  .social-btn:hover { border-color: #c7d2fe; background: #f8fafc; }
  .social-btn .ic { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0 22px; color: #94a3b8; font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
  .field { margin-bottom: 16px; }
  .field-label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .field label { font-size: 13px; font-weight: 700; color: #334155; }
  .field-label-row a { font-size: 12px; color: #4338ca; font-weight: 600; }
  .field-label-row a:hover { text-decoration: underline; }
  .input-wrap { position: relative; }
  .field input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: inherit; transition: all .15s; background: white; color: #0f172a; }
  .field input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
  .field input.has-toggle { padding-right: 58px; }
  .toggle-pw { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748b; font-size: 12px; font-weight: 700; padding: 6px 10px; cursor: pointer; font-family: inherit; }
  .toggle-pw:hover { color: #4f46e5; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 13px; color: #64748b; }
  .check-row input { accent-color: #4f46e5; }
  .submit { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,70,229,0.35); }
  .submit:disabled { opacity: 0.6; cursor: wait; transform: none; box-shadow: none; }
  .submit.success { background: #059669; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; display: none; }
  .error-msg.show { display: block; }
  .switch-auth { text-align: center; margin-top: 22px; font-size: 14px; color: #64748b; }
  .switch-auth a { color: #4338ca; font-weight: 700; }
  .switch-auth a:hover { text-decoration: underline; }
  .back-link { text-align: center; margin-top: 18px; font-size: 13px; }
  .back-link a { color: #cbd5e1; }
  .back-link a:hover { color: white; }
</style>
</head>
<body>
<div class="outer">
  <div class="card">
    <a href="index.html" class="brand"><span class="logo">✈</span><span>PointsIQ<small>Loyalty Portfolio</small></span></a>
    <h1>Welcome back</h1>
    <p class="sub">Log in to see your portfolio and latest redemption picks.</p>
    <div class="social-row">
      <button class="social-btn" type="button" onclick="mockSocial('Google')"><span class="ic" style="color:#ea4335">G</span>Google</button>
      <button class="social-btn" type="button" onclick="mockSocial('Apple')"><span class="ic" style="color:#000"></span>Apple</button>
    </div>
    <div class="divider">or with email</div>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <div class="field-label-row"><label for="password">Password</label><a href="#">Forgot password?</a></div>
        <div class="input-wrap">
          <input id="password" name="password" type="password" placeholder="Your password" required autocomplete="current-password" class="has-toggle"/>
          <button type="button" class="toggle-pw" onclick="togglePw('password', this)">Show</button>
        </div>
      </div>
      <div class="check-row"><input id="remember" type="checkbox" checked/><label for="remember">Remember me for 30 days</label></div>
      <button type="submit" class="submit" id="submitBtn">Log in →</button>
    </form>
    <div class="switch-auth">New to PointsIQ? <a href="signup.html">Create an account</a></div>
  </div>
</div>
<div class="back-link" style="position:fixed;bottom:16px;left:0;right:0;z-index:2;"><a href="index.html">← Back to home</a></div>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
    else { input.type = 'password'; btn.textContent = 'Show'; }
  }
  function mockSocial(provider) {
    const err = document.getElementById('errorMsg');
    err.textContent = provider + ' sign-in is not wired up yet. Use email for now.';
    err.className = 'error-msg show';
  }
  const form = document.getElementById('loginForm');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    err.className = 'error-msg';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = 'Please enter a valid email address.'; err.className = 'error-msg show'; return; }
    if (pw.length < 1) { err.textContent = 'Please enter your password.'; err.className = 'error-msg show'; return; }
    try {
      const existing = JSON.parse(localStorage.getItem('pointsiq_user') || '{}');
      localStorage.setItem('pointsiq_user', JSON.stringify(Object.assign({}, existing, { email, lastLogin: Date.now() })));
    } catch (_) {}
    btn.disabled = true;
    btn.textContent = '✓ Logging you in...';
    btn.className = 'submit success';
    setTimeout(() => { window.location.href = 'pointsiq.html'; }, 700);
  });
</script>
</body>
</html>
